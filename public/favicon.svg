<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Fondo: ventana biselada con título sage -->
  <rect x="2" y="2" width="28" height="28" fill="#1a1a1a"/>
  <rect x="3" y="3" width="26" height="26" fill="#f4f1e8"/>
  <!-- Barra de título sage -->
  <rect x="3" y="3" width="26" height="6" fill="#2d6a4f"/>
  <rect x="3" y="9" width="26" height="1" fill="#1a1a1a"/>
  <!-- Botoncitos en la barra de título -->
  <rect x="22" y="5" width="2" height="2" fill="#d4cfbf"/>
  <rect x="25" y="5" width="2" height="2" fill="#d4cfbf"/>
  <!-- Carpeta dentro de la ventana -->
  <rect x="9" y="14" width="6" height="2" fill="#2d6a4f"/>
  <rect x="9" y="16" width="14" height="9" fill="#2d6a4f"/>
  <rect x="10" y="17" width="12" height="1" fill="#95d5b2"/>
</svg>
